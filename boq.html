<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Huliot EZE BOQ Multi-User</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#EEF2F7;min-height:100vh;font-size:13px;color:#1E293B}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}

/* LOGIN OVERLAY */
#login-overlay { position: fixed; inset: 0; background: #0F172A; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 360px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
.login-card h2 { margin-bottom: 20px; color: #1E3A5F; text-align: center; }
.login-card input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #CBD5E1; border-radius: 8px; outline: none; }
.login-card button { width: 100%; padding: 12px; background: #1D4ED8; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; }

/* APP STYLES */
#header{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);padding:11px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;box-shadow:0 4px 18px rgba(0,0,0,.3)}
#logo{font-size:18px;font-weight:900;color:#FBBF24;letter-spacing:-1px;white-space:nowrap}
#user-tag { margin-left: auto; color: white; font-size: 10px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; }
#proj-inp{flex:1;min-width:120px;padding:6px 10px;border-radius:8px;border:none;font-size:12px;font-weight:600;background:rgba(255,255,255,0.13);color:white;outline:none}
.line-btn{padding:6px 12px;border-radius:7px;border:none;font-weight:700;font-size:11px;transition:all .15s}
.line-btn.active{background:#FBBF24;color:#0F172A}
.line-btn:not(.active){background:rgba(255,255,255,.13);color:white}
#sh-bar{padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;transition:background .2s,border-color .2s;border-bottom:3px solid #94A3B8}
#sh-select{appearance:none;padding:7px 30px 7px 11px;border-radius:10px;border:2px solid #94A3B8;background:white;font-weight:900;font-size:14px;outline:none;min-width:180px}
#tabs{display:flex;background:white;border-bottom:2px solid #D1D5DB;padding:0 14px;overflow-x:auto}
.tab-btn{padding:9px 14px;border:none;background:none;font-weight:700;font-size:12px;color:#6B7280;border-bottom:3px solid transparent;white-space:nowrap}
.tab-btn.active{color:#1D4ED8;border-bottom:3px solid #1D4ED8}
#main{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.panel{background:white;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;}
.dn-btn{padding:7px 10px;border-radius:10px;border:2px solid #CBD5E1;background:white;min-width:56px;}
.dn-btn.active{border-color: #1D4ED8; background: #EFF6FF;}
#srch{padding:8px 12px;border-radius:9px;border:1px solid #CBD5E1;width:100%;margin: 10px 0;}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:6px 8px;background:#F8FAFC;font-size:9px;color:#64748B;text-transform:uppercase;border-bottom:1px solid #E2E8F0}
.tbl td{padding:6px 8px;border-bottom:1px solid #F8FAFC}
.qty-inp{width:46px;padding:4px;border-radius:6px;border:1px solid #CBD5E1;text-align:center}
.add-btn{padding:6px 10px;border:none;border-radius:8px;font-weight:800;color:white;min-width:52px}
#toast{position:fixed;top:14px;right:14px;z-index:9999;padding:10px 16px;border-radius:10px;color:white;display:none;}
.boq-row { border:1px solid #E2E8F0; border-radius:8px; padding:12px; background:white; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <h2>EZE BOQ Login</h2>
    <input type="text" id="login-id" placeholder="User ID (e.g. 101)">
    <input type="password" id="login-pw" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <p id="login-err" style="color:red; font-size:11px; margin-top:10px; text-align:center; display:none;"></p>
  </div>
</div>

<div id="toast"></div>

<div id="header">
  <span id="logo">⚙ Huliot BOQ</span>
  <input id="proj-inp" placeholder="Project name..." oninput="G.proj=this.value">
  <div style="display:flex;gap:5px">
    <button class="line-btn active" id="btn-ht" onclick="setLine('HT Pro')">HT Pro</button>
    <button class="line-btn" id="btn-us" onclick="setLine('Ultra Silent')">Ultra Silent</button>
  </div>
  <span id="user-tag">User: Not Logged In</span>
  <button onclick="handleLogout()" style="background:none; border:1px solid white; color:white; font-size:9px; padding:2px 6px; border-radius:4px; cursor:pointer;">Logout</button>
</div>

<div id="sh-bar">
  <select id="sh-select" onchange="setGSH(this.value)"></select>
  <div id="quick-chips" style="display:flex; gap:4px; flex:1"></div>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="setTab('catalog')" id="tab-catalog">📦 Catalog</button>
  <button class="tab-btn" onclick="setTab('boq')" id="tab-boq">📋 BOQ</button>
  <button class="tab-btn" onclick="setTab('summary')" id="tab-summary">📊 Summary</button>
  <button class="tab-btn" onclick="setTab('saved')" id="tab-saved">📁 Saved Projects</button>
</div>

<div id="main">
  <div id="pane-catalog">
    <div id="dn-grid" style="display:flex; gap:5px; flex-wrap:wrap"></div>
    <input id="srch" placeholder="🔍 Search catalog..." oninput="G.srch=this.value;renderCatalog()">
    <div class="panel">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Code</th><th>Description</th><th>DN</th><th>Price</th><th>Qty</th><th>Add</th></tr></thead>
          <tbody id="cat-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="pane-boq" style="display:none">
    <div class="panel" style="padding:15px">
      <button class="line-btn active" onclick="saveToFirebase()" style="background:#10B981; width:100%; margin-bottom:10px">☁ Save Project to Cloud</button>
      <div id="boq-list"></div>
    </div>
  </div>

  <div id="pane-summary" style="display:none">
    <div id="sum-cards"></div>
    <div id="sum-groups"></div>
  </div>

  <div id="pane-saved" style="display:none">
    <div class="panel" style="padding:15px">
      <button class="line-btn" onclick="fetchSavedProjects()" style="background:#1D4ED8; color:white; width:100%; margin-bottom:15px">🔄 Refresh My Projects</button>
      <div id="saved-loading" style="display:none; text-align:center">⏳ Fetching your data...</div>
      <div id="saved-list"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
  // REPLACE THESE WITH YOUR KEYS
  const firebaseConfig = {
    apiKey: "AIzaSyDEto3-79RwBFN1N8miQILvqSeC8yqOlFI",
    authDomain: "eze-plumbing.firebaseapp.com",
    projectId: "eze-plumbing",
    storageBucket: "eze-plumbing.firebasestorage.app",
    messagingSenderId: "555814405995",
    appId: "1:555814405995:web:a1a69592deedbb906d2e2e"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  // ── DATA ──
  const P=[
    ["5404000025-i","S/S Pipe L=250mm","Pipe",40,77,"HT Pro","S/S 250mm"],
    ["5405000025-i","S/S Pipe L=250mm","Pipe",50,88,"HT Pro","S/S 250mm"],
    ["5407500025-i","S/S Pipe L=250mm","Pipe",75,147,"HT Pro","S/S 250mm"],
    ["5401100025-i","S/S Pipe L=250mm","Pipe",110,243,"HT Pro","S/S 250mm"],
    ["54040050-i","S/S Pipe L=500mm","Pipe",40,113,"HT Pro","S/S 500mm"],
    ["54050050-i","S/S Pipe L=500mm","Pipe",50,147,"HT Pro","S/S 500mm"],
    ["54075050-i","S/S Pipe L=500mm","Pipe",75,252,"HT Pro","S/S 500mm"],
    ["540110050-i","S/S Pipe L=500mm","Pipe",110,411,"HT Pro","S/S 500mm"]
  ].map(r=>({code:r[0],desc:r[1],type:r[2],dn:r[3],price:r[4],line:r[5],sub:r[6]}));

  const SH_CODES=["NA",...Array.from({length:20},(_,i)=>`SH${String(i+1).padStart(2,"0")}`)];
  const G={line:"HT Pro",gsh:"NA",boq:[],proj:"",dnF:null,srch:"",tab:"catalog",currentUser:null};

  // ── AUTH LOGIC ──
  auth.onAuthStateChanged(user => {
    if (user) {
      G.currentUser = user;
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('user-tag').textContent = `User: ${user.email.split('@')[0]}`;
      fetchSavedProjects();
    } else {
      document.getElementById('login-overlay').style.display = 'flex';
    }
  });

  async function handleLogin() {
    const id = document.getElementById('login-id').value;
    const pw = document.getElementById('login-pw').value;
    const errEl = document.getElementById('login-err');
    if(!id || !pw) return;
    
    // Auto-formatting ID to email
    const email = id.includes('@') ? id : `${id}@huliot.com`;
    
    try {
      errEl.style.display = 'none';
      await auth.signInWithEmailAndPassword(email, pw);
    } catch (err) {
      errEl.textContent = "Login Failed: " + err.message;
      errEl.style.display = 'block';
    }
  }

  function handleLogout() { auth.signOut(); G.boq = []; renderCatalog(); }

  // ── APP LOGIC ──
  const fmt=n=>"₹"+Math.round(n).toLocaleString("en-IN");
  function showToast(msg,type="ok"){
    const t=document.getElementById("toast");
    t.textContent=msg; t.style.background=type==="err"?"#DC2626":"#10B981";
    t.style.display="block"; setTimeout(()=>t.style.display="none",2000);
  }

  function initShSelect(){
    document.getElementById("sh-select").innerHTML=SH_CODES.map(c=>`<option value="${c}">${c}</option>`).join("");
  }
  function setGSH(v){G.gsh=v; renderCatalog();}
  function setTab(t){
    G.tab=t;
    ["catalog","boq","summary","saved"].forEach(id=>{
      document.getElementById("pane-"+id).style.display=t===id?"":"none";
      document.getElementById("tab-"+id).className="tab-btn"+(t===id?" active":"");
    });
  }

  function renderCatalog(){
    const rows = P.filter(x => x.line === G.line && (!G.srch || x.desc.toLowerCase().includes(G.srch.toLowerCase())));
    document.getElementById("cat-body").innerHTML=rows.map(prod=>`
      <tr>
        <td>${prod.code}</td>
        <td>${prod.desc}</td>
        <td>${prod.dn}</td>
        <td>${fmt(prod.price)}</td>
        <td><input type="number" class="qty-inp" id="q_${prod.code.replace(/[^a-z0-9]/gi,'_')}" value="1"></td>
        <td><button class="add-btn" style="background:#1D4ED8" onclick="addItem('${prod.code}')">+ Add</button></td>
      </tr>`).join("");
  }

  function addItem(code){
    const prod=P.find(p=>p.code===code);
    const qty = +document.getElementById("q_"+code.replace(/[^a-z0-9]/gi,'_')).value;
    G.boq.push({...prod, qty, shaft: G.gsh});
    showToast("Added " + prod.desc);
  }

  async function saveToFirebase() {
    if (!G.boq.length) return showToast("BOQ empty","err");
    try {
      await db.collection("boq_projects").add({
        projectName: G.proj || "Untitled",
        userId: G.currentUser.uid, // <--- SEPARATE DATA TAG
        userEmail: G.currentUser.email,
        items: G.boq,
        total: G.boq.reduce((s,b)=>s+(b.qty*b.price),0),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      G.boq = []; showToast("✅ Saved to your account!"); setTab('saved');
    } catch(e){ showToast("Save error","err"); }
  }

  async function fetchSavedProjects() {
    if(!G.currentUser) return;
    document.getElementById('saved-loading').style.display='block';
    const list = document.getElementById('saved-list');
    list.innerHTML = '';
    
    // <--- ONLY FETCH THIS USER'S DATA
    const snap = await db.collection("boq_projects")
      .where("userId", "==", G.currentUser.uid)
      .orderBy("createdAt", "desc").get();
    
    document.getElementById('saved-loading').style.display='none';
    snap.forEach(doc => {
      const d = doc.data();
      list.innerHTML += `
        <div class="boq-row">
          <div><b>📁 ${d.projectName}</b><br><small>${d.items.length} items</small></div>
          <div style="color:#10B981; font-weight:900">${fmt(d.total)}</div>
        </div>`;
    });
  }

  function setLine(l){ G.line=l; renderCatalog(); }

  (function init(){
    initShSelect();
    renderCatalog();
  })();
</script>
</body>
</html>
