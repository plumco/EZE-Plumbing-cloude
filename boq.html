<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Huliot EZE BOQ Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#EEF2F7;min-height:100vh;font-size:13px;color:#1E293B}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* LOGIN OVERLAY */
#login-overlay { position: fixed; inset: 0; background: #0F172A; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 360px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); text-align: center;}
.login-card h2 { margin-bottom: 20px; color: #1E3A5F; font-weight: 900; }
.login-card input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #CBD5E1; border-radius: 8px; outline: none; }
.login-card button { width: 100%; padding: 12px; background: #1D4ED8; color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 15px; }

/* HEADER */
#header{background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 100%);padding:11px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;box-shadow:0 4px 18px rgba(0,0,0,.3)}
#logo{font-size:18px;font-weight:900;color:#FBBF24;letter-spacing:-1px;white-space:nowrap}
#logo small{font-size:9px;color:rgba(255,255,255,.35);font-weight:400;margin-left:4px}
#proj-inp{flex:1;min-width:120px;padding:6px 10px;border-radius:8px;border:none;font-size:12px;font-weight:600;background:rgba(255,255,255,.13);color:white;outline:none}
#proj-inp::placeholder{color:rgba(255,255,255,.45)}
.line-btn{padding:6px 12px;border-radius:7px;border:none;font-weight:700;font-size:11px;transition:all .15s}
.line-btn.active{background:#FBBF24;color:#0F172A}
.line-btn:not(.active){background:rgba(255,255,255,.13);color:white}

/* SHAFT BAR */
#sh-bar{padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;transition:background .2s,border-color .2s;border-bottom:3px solid #94A3B8}
#sh-label{font-size:12px;font-weight:800;white-space:nowrap}
#sh-select-wrap{position:relative;flex-shrink:0}
#sh-select{appearance:none;padding:7px 30px 7px 11px;border-radius:10px;border:2px solid #94A3B8;background:white;font-weight:900;font-size:14px;cursor:pointer;outline:none;min-width:180px;max-width:220px}
#sh-select-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:11px}
#quick-chips{display:flex;gap:4px;flex-wrap:wrap;flex:1;align-items:center}
.qchip{padding:3px 8px;border-radius:8px;border:2px solid #CBD5E1;background:white;font-size:10px;font-weight:800;color:#64748B;transition:all .12s}
#sh-info{font-size:10px;font-weight:600;white-space:nowrap}

/* TABS */
#tabs{display:flex;background:white;border-bottom:2px solid #D1D5DB;padding:0 14px;overflow-x:auto}
.tab-btn{padding:9px 14px;border:none;background:none;font-weight:700;font-size:12px;color:#6B7280;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:color .15s}
.tab-btn.active{color:#1D4ED8;border-bottom:3px solid #1D4ED8}

/* MAIN */
#main{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.panel{background:white;border-radius:12px;border:1px solid #E2E8F0;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}

/* DN BUTTONS */
#dn-section{margin-bottom:4px}
.sec-lbl{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
#dn-grid{display:flex;gap:5px;flex-wrap:wrap}
.dn-btn{padding:7px 10px;border-radius:10px;border:2px solid #CBD5E1;background:white;text-align:center;min-width:56px;transition:all .15s}
.dn-btn .dn-num{display:block;font-size:13px;font-weight:800;color:#1E293B}
.dn-btn .dn-cnt{font-size:9px;color:#94A3B8}
.dn-btn.active .dn-num{color:var(--c)}
.dn-btn.active{background:var(--cbg);border-color:var(--c);box-shadow:0 0 0 3px var(--cs)}

/* CAT PILLS */
#cat-pills{display:flex;gap:4px;flex-wrap:wrap}
.cat-pill{padding:4px 10px;border-radius:20px;border:1px solid #D1D5DB;background:white;font-size:10px;font-weight:700;color:#64748B;transition:all .15s}
.cat-pill.active{color:white}

/* SEARCH */
#srch{padding:8px 12px;border-radius:9px;border:1px solid #CBD5E1;font-size:13px;outline:none;width:100%;background:white}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:6px 8px;background:#F8FAFC;font-size:9px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #E2E8F0;white-space:nowrap}
.tbl td{padding:6px 8px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
.mono{font-family:monospace;font-size:10px;color:#64748B}
.desc-main{font-weight:600;color:#1E293B}
.desc-sub{font-size:10px;color:#94A3B8}
.dn-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:800}
.type-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.qty-inp{width:46px;padding:4px;border-radius:6px;border:1px solid #CBD5E1;text-align:center;font-size:12px;font-weight:700}
.add-btn{padding:6px 10px;border:none;border-radius:8px;font-weight:800;font-size:11px;color:white;line-height:1.3;text-align:center;min-width:52px}
.del-btn{background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;padding:3px 8px;border-radius:6px;font-size:11px}
.total-bar{background:linear-gradient(90deg,#0F172A,#1E3A5F);color:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:0 0 10px 10px}
.total-disp{margin-left:auto;font-weight:800;color:#1D4ED8;font-size:13px}

/* BOQ CONTROLS */
#boq-hdr{background:linear-gradient(135deg,#0F172A,#1E3A5F);padding:10px 14px;display:flex;align-items:center;flex-wrap:wrap;gap:7px}
#boq-title{font-size:13px;font-weight:700;color:white;margin-right:4px}
.hdr-btn{padding:6px 11px;border-radius:7px;border:none;font-weight:700;font-size:11px}

#toast{position:fixed;top:14px;right:14px;z-index:9999;padding:10px 16px;border-radius:10px;font-weight:700;font-size:12px;color:white;box-shadow:0 4px 20px rgba(0,0,0,.3);display:none;max-width:280px}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <div style="font-size: 40px; margin-bottom: 10px;">⚙️</div>
    <h2>Huliot BOQ Login</h2>
    <input type="text" id="login-id" placeholder="User ID (e.g. 101)">
    <input type="password" id="login-pw" placeholder="Password">
    <button onclick="handleLogin()">Login</button>
    <p id="login-err" style="color:#DC2626; font-size:11px; margin-top:10px; display:none; font-weight:700;"></p>
  </div>
</div>

<div id="toast"></div>

<div id="header">
  <span id="logo">⚙ Huliot BOQ <small>v6 · Apr 2026</small></span>
  <input id="proj-inp" placeholder="Project / Site name..." oninput="G.proj=this.value">
  <div style="display:flex;gap:5px">
    <button class="line-btn active" id="btn-ht" onclick="setLine('HT Pro')">🔶 HT Pro</button>
    <button class="line-btn" id="btn-us" onclick="setLine('Ultra Silent')">🔷 Ultra Silent</button>
  </div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:10px;">
    <span id="user-tag" style="color:white; font-size:10px; font-weight:700; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:20px;">User: ---</span>
    <button onclick="handleLogout()" style="background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; font-size:9px; padding:3px 8px; border-radius:4px;">Logout</button>
  </div>
</div>

<div id="sh-bar" style="background:#F1F5F9;border-bottom-color:#94A3B8">
  <span id="sh-label" style="color:#64748B">📍 LOCATION:</span>
  <div id="sh-select-wrap">
    <select id="sh-select" onchange="setGSH(this.value)"></select>
    <span id="sh-select-arrow">▼</span>
  </div>
  <div id="quick-chips"></div>
  <span id="sh-info" style="color:#64748B">All adds → <b id="sh-info-name">NA</b></span>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="setTab('catalog')" id="tab-catalog">📦 Catalog</button>
  <button class="tab-btn" onclick="setTab('boq')" id="tab-boq">📋 BOQ</button>
  <button class="tab-btn" onclick="setTab('summary')" id="tab-summary">📊 Summary</button>
  <button class="tab-btn" onclick="setTab('saved')" id="tab-saved">📁 Saved Projects</button>
</div>

<div id="main">
  <div id="pane-catalog">
    <div id="dn-section">
      <div class="sec-lbl">Select Size (DN)</div>
      <div id="dn-grid"></div>
    </div>
    <div id="cat-pills" style="margin-bottom:8px"></div>
    <input id="srch" placeholder="🔍 Search item code, description..." oninput="G.srch=this.value;renderCatalog()">
    <div class="panel" style="margin-top:8px">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr><th>Code</th><th>Description</th><th>DN</th><th>Type</th><th style="text-align:right">Price</th><th>Qty</th><th>Add</th></tr></thead>
          <tbody id="cat-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="pane-boq" style="display:none">
    <div class="panel">
      <div id="boq-hdr">
        <span id="boq-title">📋 Bill of Quantities</span>
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <button class="hdr-btn" style="background:#FBBF24;color:#0F172A" onclick="exportXL()">⬇ Excel</button>
          <button class="hdr-btn" style="background:#10B981;color:white" onclick="saveToFirebase()">☁ Save to Cloud</button>
          <button class="hdr-btn" style="background:#DC2626;color:white" onclick="clearBOQ()">🗑 Clear</button>
        </div>
      </div>
      <div id="boq-table-wrap">
        <table class="tbl">
          <tbody id="boq-body"></tbody>
        </table>
        <div class="total-bar">
          <div style="font-weight:700">GRAND TOTAL</div>
          <span id="total-amt" style="font-weight:900;font-size:20px;color:#FBBF24"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="pane-summary" style="display:none">
    <div id="sum-groups"></div>
  </div>

  <div id="pane-saved" style="display:none">
    <div class="panel">
      <div class="panel-hdr" style="background:linear-gradient(135deg,#0F172A,#1E3A5F); color:white; padding:10px;">
        <span style="font-weight:700">📁 Saved Cloud Projects</span>
        <button class="hdr-btn" style="background:#10B981;color:white; float:right" onclick="fetchSavedProjects()">🔄 Refresh</button>
      </div>
      <div id="saved-loading" style="display:none; text-align:center; padding:20px">⏳ Fetching cloud data...</div>
      <div id="saved-list" style="padding:15px; background:#F8FAFC; display:flex; flex-direction:column; gap:10px"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
  // FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDEto3-79RwBFN1N8miQILvqSeC8yqOlFI",
    authDomain: "eze-plumbing.firebaseapp.com",
    projectId: "eze-plumbing",
    storageBucket: "eze-plumbing.firebasestorage.app",
    messagingSenderId: "555814405995",
    appId: "1:555814405995:web:a1a69592deedbb906d2e2e"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  // ── FULL PRODUCT DATA RESTORED ──
  const P=[
    ["5404000025-i","S/S Pipe L=250mm","Pipe",40,77,"HT Pro","S/S 250mm"],
    ["5405000025-i","S/S Pipe L=250mm","Pipe",50,88,"HT Pro","S/S 250mm"],
    ["5407500025-i","S/S Pipe L=250mm","Pipe",75,147,"HT Pro","S/S 250mm"],
    ["5401100025-i","S/S Pipe L=250mm","Pipe",110,243,"HT Pro","S/S 250mm"],
    ["5401200025-i","S/S Pipe L=250mm","Pipe",125,392,"HT Pro","S/S 250mm"],
    ["54040050-i","S/S Pipe L=500mm","Pipe",40,113,"HT Pro","S/S 500mm"],
    ["54050050-i","S/S Pipe L=500mm","Pipe",50,147,"HT Pro","S/S 500mm"],
    ["54075050-i","S/S Pipe L=500mm","Pipe",75,252,"HT Pro","S/S 500mm"],
    ["540110050-i","S/S Pipe L=500mm","Pipe",110,411,"HT Pro","S/S 500mm"],
    ["40010460-i","Bend 45° DN40","Bend",40,66,"HT Pro","45°"],
    ["40020460-i","Bend 45° DN50","Bend",50,82,"HT Pro","45°"],
    ["40644460-i","Single Y 45° 110×110","Branch",110,575,"HT Pro","Y 110×110"],
    ["60117051","Multi Floor Trap MFT 7\"","Trap",110,1256,"HT Pro","MFT"],
    ["48100011-S","Split Clamp DN110","Clamp",110,210,"HT Pro","Clamp"],
    // ULTRA SILENT RESTORED
    ["5754000025-i","US S/S Pipe L=250mm","Pipe",40,117,"Ultra Silent","S/S 250mm"],
    ["5755000025-i","US S/S Pipe L=250mm","Pipe",50,152,"Ultra Silent","S/S 250mm"],
    ["7070040470-i","US Bend 45° DN110","Bend",110,641,"Ultra Silent","45°"]
  ].map(r=>({code:r[0],desc:r[1],type:r[2],dn:r[3],price:r[4],line:r[5],sub:r[6]}));

  const SH_CODES=["NA",...Array.from({length:30},(_,i)=>`SH${String(i+1).padStart(2,"0")}`)];
  const DNC={40:"#1D4ED8",50:"#0E7490",75:"#065F46",110:"#B45309",125:"#B91C1C"};

  // ── STATE ──
  const G={line:"HT Pro",gsh:"NA",boq:[],proj:"",dnF:null,srch:"",tab:"catalog",currentUser:null,currentDocId:null};

  const fmt=n=>"₹"+Math.round(n).toLocaleString("en-IN");
  const grand=()=>G.boq.reduce((s,b)=>s+(b.qty*b.price),0);

  function showToast(msg,type="ok"){
    const t=document.getElementById("toast");
    t.textContent=msg; t.style.background=type==="err"?"#DC2626":"#10B981";
    t.style.display="block"; setTimeout(()=>t.style.display="none",2500);
  }

  // ── AUTH ──
  auth.onAuthStateChanged(user => {
    if (user) {
      G.currentUser = user; document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('user-tag').textContent = `User: ${user.email.split('@')[0]}`;
      fetchSavedProjects();
    } else { document.getElementById('login-overlay').style.display = 'flex'; }
  });

  async function handleLogin() {
    const id = document.getElementById('login-id').value.trim(), pw = document.getElementById('login-pw').value;
    if(!id || !pw) return;
    const email = id.includes('@') ? id : `${id}@huliot.com`;
    try { await auth.signInWithEmailAndPassword(email, pw); } 
    catch (e) { document.getElementById('login-err').textContent=e.message; document.getElementById('login-err').style.display='block'; }
  }
  function handleLogout() { auth.signOut(); G.boq=[]; G.currentDocId=null; renderCatalog(); }

  // ── UI LOGIC ──
  function setTab(t){
    G.tab=t; ["catalog","boq","summary","saved"].forEach(id=>{
      document.getElementById("pane-"+id).style.display=t===id?"":"none";
      document.getElementById("tab-"+id).className="tab-btn"+(t===id?" active":"");
    });
    if(t==="boq") renderBOQ();
  }

  function renderCatalog(){
    const rows = P.filter(x=>x.line===G.line && (!G.dnF||x.dn===G.dnF) && (!G.srch||x.desc.toLowerCase().includes(G.srch.toLowerCase())));
    document.getElementById("cat-body").innerHTML = rows.map(p=>`
      <tr>
        <td class="mono">${p.code}</td>
        <td><div class="desc-main">${p.desc}</div></td>
        <td style="text-align:center"><span class="dn-badge" style="background:${DNC[p.dn]}18;color:${DNC[p.dn]}">${p.dn}</span></td>
        <td style="text-align:center">${p.type}</td>
        <td style="text-align:right">${fmt(p.price)}</td>
        <td style="text-align:center"><input type="number" class="qty-inp" id="q_${p.code.replace(/[^a-z0-9]/gi,'_')}" value="1"></td>
        <td style="text-align:center"><button class="add-btn" style="background:#1D4ED8" onclick="addItem('${p.code}')">+ Add</button></td>
      </tr>`).join("");
  }

  function addItem(code){
    const p = P.find(x=>x.code===code);
    const qty = +document.getElementById("q_"+code.replace(/[^a-z0-9]/gi,'_')).value;
    const uid = Math.random().toString(36).slice(2,7);
    G.boq.push({...p, qty, shaft: G.gsh, _id: uid});
    showToast(`Added to ${G.gsh}`);
  }

  function renderBOQ(){
    document.getElementById("boq-body").innerHTML = G.boq.map(b=>`
      <tr>
        <td style="padding:10px"><b>${b.shaft}</b></td>
        <td>${b.desc}</td>
        <td style="text-align:center"><input type="number" class="qty-inp" value="${b.qty}" onchange="updQty('${b._id}', this.value)"></td>
        <td style="text-align:right; font-weight:700">${fmt(b.qty * b.price)}</td>
        <td style="text-align:center"><button class="del-btn" onclick="delItem('${b._id}')">✕</button></td>
      </tr>`).join("");
    document.getElementById("total-amt").textContent = fmt(grand());
  }

  function updQty(id,v){ const b=G.boq.find(x=>x._id==id); if(b) b.qty=Math.max(1,+v); renderBOQ(); }
  function delItem(id){ G.boq=G.boq.filter(x=>x._id!=id); renderBOQ(); }
  function clearBOQ(){ if(confirm("Clear all?")){ G.boq=[]; G.currentDocId=null; renderBOQ(); } }

  // ── CLOUD SYNC ──
  async function saveToFirebase() {
    if (!G.boq.length) return showToast("BOQ is empty!", "err");
    const data = { projectName: G.proj || "Untitled Project", userId: G.currentUser.uid, items: G.boq, totalAmount: grand(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    try {
      if (G.currentDocId) {
        await db.collection("boq_projects").doc(G.currentDocId).set(data, {merge:true});
        showToast("✅ Project updated!", "ok");
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        const res = await db.collection("boq_projects").add(data);
        G.currentDocId = res.id;
        showToast("✅ Project saved!", "ok");
      }
      fetchSavedProjects();
    } catch (e) { showToast("❌ Error saving!", "err"); }
  }

  async function fetchSavedProjects() {
    if(!G.currentUser) return;
    const list = document.getElementById('saved-list');
    document.getElementById('saved-loading').style.display='block';
    try {
      const snap = await db.collection("boq_projects").where("userId","==",G.currentUser.uid).orderBy("updatedAt","desc").get();
      document.getElementById('saved-loading').style.display='none';
      list.innerHTML = snap.empty ? '<div class="empty">No projects found</div>' : '';
      snap.forEach(doc => {
        const d = doc.data();
        list.innerHTML += `
          <div style="border:1px solid #E2E8F0; border-radius:12px; padding:15px; background:white; display:flex; justify-content:space-between; align-items:center;">
            <div><b>📁 ${d.projectName}</b><br><small>${d.items.length} items</small></div>
            <div style="display:flex; gap:10px; align-items:center">
              <span style="font-weight:900; color:#10B981">${fmt(d.totalAmount)}</span>
              <button onclick="loadProject('${doc.id}')" style="background:#1D4ED8; color:white; border:none; padding:8px 12px; border-radius:8px; font-weight:700; font-size:11px">✏️ Edit / Load</button>
            </div>
          </div>`;
      });
    } catch(e) { document.getElementById('saved-loading').style.display='none'; }
  }

  async function loadProject(id) {
    if(!confirm("Replace current BOQ with this project?")) return;
    const doc = await db.collection("boq_projects").doc(id).get();
    if(doc.exists){
      const d = doc.data(); G.proj=d.projectName; document.getElementById('proj-inp').value=d.projectName;
      G.boq=d.items; G.currentDocId=id; setTab('boq'); showToast("✅ Loaded!");
    }
  }

  // ── EXCEL EXPORT RESTORED ──
  function exportXL(){
    if(!G.boq.length) return showToast("BOQ is empty","err");
    const wb=XLSX.utils.book_new();
    const agg = {}; G.boq.forEach(b=>{ if(!agg[b.code]) agg[b.code]={...b,qty:0}; agg[b.code].qty+=b.qty; });
    const summary = [["Code","Description","DN","Qty","Price","Total"]];
    Object.values(agg).forEach(r=>summary.push([r.code,r.desc,r.dn,r.qty,r.price,r.qty*r.price]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), "BOQ Summary");
    XLSX.writeFile(wb, `${G.proj||'Huliot'}_BOQ.xlsx`);
  }

  function setGSH(v){ G.gsh=v; document.getElementById("sh-info-name").textContent=v; }
  function setLine(l){ G.line=l; renderCatalog(); }

  (function init(){
    document.getElementById("sh-select").innerHTML = SH_CODES.map(c=>`<option value="${c}">${c}</option>`).join("");
    renderCatalog();
  })();
</script>
</body>
